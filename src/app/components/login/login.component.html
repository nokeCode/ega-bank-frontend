<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Banque EGA</title>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <!-- Logo et titre -->
    <div class="text-center">
      <div class="bank-logo">
        <i class="fas fa-university"></i>
      </div>
      <h1 class="bank-title">Banque EGA</h1>
      <p class="bank-subtitle">Sécurité et confiance depuis 2024</p>
    </div>

    <!-- Message d'erreur -->
    <div *ngIf="errorMessage" class="alert-message error">
      <i class="fas fa-exclamation-circle"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <!-- Formulaire -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <!-- Nom d'utilisateur -->
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-user"></i>
          Nom d'utilisateur
        </label>
        <div class="input-wrapper">
          <i class="fas fa-user-circle input-icon"></i>
          <input
            type="text"
            class="form-input"
            id="username"
            name="username"
            [(ngModel)]="loginData.username"
            required
            placeholder="Entrez votre nom d'utilisateur"
            #username="ngModel"
          >
        </div>
        <div *ngIf="username.invalid && (username.dirty || username.touched)" class="form-hint error">
          <i class="fas fa-exclamation-circle"></i>
          <span>Le nom d'utilisateur est obligatoire</span>
        </div>
      </div>

      <!-- Mot de passe -->
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-lock"></i>
          Mot de passe
        </label>
        <div class="input-wrapper">
          <i class="fas fa-key input-icon"></i>
          <input
            [type]="showPassword ? 'text' : 'password'"
            class="form-input"
            id="password"
            name="password"
            [(ngModel)]="loginData.password"
            required
            placeholder="Entrez votre mot de passe"
            #password="ngModel"
          >
          <button 
            type="button" 
            class="password-toggle"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Cacher le mot de passe' : 'Afficher le mot de passe'"
          >
            <i class="fas" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"></i>
          </button>
        </div>
        <div *ngIf="password.invalid && (password.dirty || password.touched)" class="form-hint error">
          <i class="fas fa-exclamation-circle"></i>
          <span>Le mot de passe est obligatoire</span>
        </div>
      </div>

      <!-- Options supplémentaires -->
      <div class="additional-options">
        <label class="remember-me">
          <input type="checkbox" name="remember" id="remember">
          <span>Se souvenir de moi</span>
        </label>
        <a href="#" class="forgot-password">
          <i class="fas fa-question-circle me-1"></i>
          Mot de passe oublié ?
        </a>
      </div>

      <!-- Bouton de connexion -->
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="!loginForm.valid || isLoading"
      >
        <span *ngIf="isLoading" class="spinner"></span>
        <i *ngIf="!isLoading" class="fas fa-sign-in-alt"></i>
        {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>

      <!-- Information de sécurité -->
      <div class="security-info">
        <p>
          <i class="fas fa-shield-alt"></i>
          Vos informations sont sécurisées avec chiffrement SSL
        </p>
      </div>
    </form>

    <!-- Liens de pied de page -->
    <div class="login-footer">
      <p>Pas encore de compte ?</p>
      <a routerLink="/register" class="register-link">
        <i class="fas fa-user-plus"></i>
        Créer un compte
      </a>
    </div>
  </div>
</div>
</body>
</html>
