<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <!-- Logo et nom -->
    <a class="navbar-brand" routerLink="/dashboard">
      <div class="brand-content">
        <div class="brand-icon">
          <i class="fas fa-university"></i>
        </div>
        <div class="brand-text">
          <span class="brand-name">EGA Bank</span>
          <span class="brand-tagline">Banking Solutions</span>
        </div>
      </div>
    </a>

    <!-- Bouton toggle pour mobile -->
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Contenu de la navbar -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <!-- Navigation principale -->
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <div class="nav-icon">
              <i class="fas fa-chart-line"></i>
            </div>
            <span class="nav-text">Dashboard</span>
            <span class="nav-indicator"></span>
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/clients" routerLinkActive="active">
            <div class="nav-icon">
              <i class="fas fa-users"></i>
            </div>
            <span class="nav-text">Clients</span>
            <span class="nav-indicator"></span>
            <span *ngIf="hasNewClients" class="notification-badge">{{ newClientsCount }}</span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/accounts" routerLinkActive="active">
            <div class="nav-icon">
              <i class="fas fa-credit-card"></i>
            </div>
            <span class="nav-text">Comptes</span>
            <span class="nav-indicator"></span>
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" routerLink="/transactions" routerLinkActive="active">
            <div class="nav-icon">
              <i class="fas fa-exchange-alt"></i>
            </div>
            <span class="nav-text">Transactions</span>
            <span class="nav-indicator"></span>
          </a>
        </li>
      </ul>

      <!-- Section utilisateur -->
      <div class="user-section" *ngIf="currentUser">
        <div class="user-info">
          <div class="user-avatar" [style.background]="getUserColor()">
            {{ getUserInitial() }}
          </div>
          <div class="user-details">
            <span class="user-name">{{ currentUser.username }}</span>
            <span class="user-role">{{ currentUser.role || 'Utilisateur' }}</span>
          </div>
          <div class="user-dropdown">
            <button class="dropdown-toggle" (click)="toggleDropdown()">
              <i class="fas fa-chevron-down"></i>
            </button>
            <div class="dropdown-menu" [class.show]="showDropdown">
              <a class="dropdown-item" routerLink="/profile">
                <i class="fas fa-user-cog"></i>
                <span>Mon profil</span>
              </a>
              <a class="dropdown-item" routerLink="/settings">
                <i class="fas fa-cog"></i>
                <span>Paramètres</span>
              </a>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item logout-item" (click)="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Déconnexion</span>
              </button>
            </div>
          </div>
        </div>
        <button class="logout-btn" (click)="logout()">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Toast de notification -->
<div class="notification-toast" [class.show]="showNotification">
  <div class="toast-content">
    <i class="fas fa-check-circle"></i>
    <span>Déconnexion réussie. Redirection...</span>
  </div>
</div>
